# WHOLE MODEL CONFIG FILE
# USED FOR MESH AND LOWER TOMOGRAPHY MODEL (BELOW SHALLOW)
# SIMBLAST

# Path to NetCDF model
data_path: '/home/bhchow/work/data/models/FWEA23.r0.0-n4.nc'
# Optional: URL to download the model if not present
model_url:       

# Grid spacing (meters)
# Made bigger because underlying model is coarse, shallow layer will take perts
dx: 500
dy: 500
dz: 500

# Elevation range (km, negative down, positive values are above sea level, negative values are below)
z_min: -80.  # Adjust as needed
z_max: 2  # Top of the model, typically sea level or max elevation in the model

# Variable(s) to interpolate (allow a list or string)
variable: ['vpv', 'vph', 'vsv', 'vsh', 'rho', 'qmu'] 
fill_nan: 'vertical'  # How to fill NaNs: 'vertical' or null

# UTM projection zone and hemisphere
utm_zone: 52    # Set to null to use GUI for zone selection
utm_hemisphere: N     # Set to null to use GUI for hemisphere selection

# Area of Interest (optional, set by GUI if not present)
extent:          # [xmin, xmax, ymin, ymax] in projected coordinates
- 425_000.000
- 565_000.000
- 4_490_000.000
- 4_680_000.000
use_gui: false # Force GUI even if extent is set

# Mesh generation options
generate_mesh: true
mesh_output_dir: './TMP/WHOLE/meshfem3D_files'  # Directory for mesh files
max_depth: 80.0  # in km
dx_target_km: 0.45
dz_target_km: 0.45
max_cpu: 4
doubling_layers: [12.5, 35.0]  # in km

# Topography generation options
generate_topography: true
topography_output_dir: './TMP/WHOLE/meshfem3D_files'
slope_thresholds: [2.5, 10, 15] # Diagnostic thresholds for slope in degrees. Lower value is used for 'auto' smoothing.
smoothing_sigma: 'auto'  # Sigma for Gaussian smoothing of topography (default: 1, or 'auto' for adaptive smoothing)
# topo_res: 2000  # Optional: horizontal spacing (meters) - applies to both X and Y ...
# ... and if not specified, resolution is determined by priority:
#   1. User-specified topo_res in m (if provided)
#   2. Mesh resolution (if generate_mesh is true)
#   3. ETOPO1 highest resolution (~1800m)

# Tomography output options
tomo_output_dir: './TMP/WHOLE/tomo_files'  # Directory for tomography_model.xyz

# Plotting options
plot_outer_shell: False
plot_color_by: 'vs'  # or 'vs', 'rho'
show_plot: False  # Show plot interactively
